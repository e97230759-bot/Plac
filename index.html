<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plac Odpadów</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f0f0f; color: #e8e8e8; }
    #root { min-height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module">
    import { createRoot } from 'https://esm.sh/react-dom@18/client';
    import React, { createElement as h, useState, useEffect, useRef } from 'https://esm.sh/react@18';
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getDatabase, ref, onValue, set, push } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

    // ============================================================
    // FIREBASE CONFIG
    // ============================================================
    const firebaseConfig = {
      apiKey: "AIzaSyAP6SIQUkMqw_doUZhpNy-pJEjWfZx1a2o",
      authDomain: "plac-odpadow.firebaseapp.com",
      databaseURL: "https://plac-odpadow-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "plac-odpadow",
      storageBucket: "plac-odpadow.firebasestorage.app",
      messagingSenderId: "203731223327",
      appId: "1:203731223327:web:3673fc30324ae643e6262a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // ============================================================
    // DANE
    // ============================================================
    const KONTENERY = ["Karton #1","Karton #2","Folia #1","Ocynk #1","Ocynk #2","Metal czarny #1","Wełna mineralna #1","Skrzynie metalowe #1","Styropian #1","Plastik #1","Odpady drewniane #1","Odpady drewniane #2","Pianka+plastik #1","Metal z lodówek #1","Odpady formatyzacyjne #1","Plastik komory #1","Szkło #1","Chrom #1","AGD (złom) #1"];
    const WORKI = ["Aluminium z fabryki lodówek #1","Aluminium z fabryki lodówek #2","Aluminium z fabryki piekarników #1","Elektronika (e-waste) #1","Elektronika (e-waste) #2","Guma #1"];
    const STREFY = ["Kontenery","Worki na odpady","Kartony na odpady niebezpieczne","Drzwi i obudowy lodówek","Miejsce paletyzacji drzwi i obudów lodówek","Sklejone arkusze metalu","Miejsce na puste beczki","Miejsce na pojemniki plastikowe (uszkodzone)","Drobne odpady","Palety małe spakowane","Palety euro","Palety zwykłe","Butle gazowe","Miejsce na odpady drewniane"];
    const STATUSY = ["wolny","zapełnia się","pełny","w wymianie"];

    const now = () => new Date().toLocaleString("pl-PL");

    const getWarsawDate = () => {
      const s = new Date().toLocaleString("en-US", {timeZone:"Europe/Warsaw"});
      return new Date(s);
    };
    const getWarsawMins  = () => { const d=getWarsawDate(); return d.getHours()*60+d.getMinutes(); };
    const getWarsawDay   = () => getWarsawDate().getDate();
    const getWarsawMonth = () => getWarsawDate().getMonth();
    const getWarsawYear  = () => getWarsawDate().getFullYear();

    const pctColor = (p) => {
      if (p == null) return "#555";
      if (p >= 100) return "#ef4444";
      if (p >= 80) return "#f97316";
      if (p >= 60) return "#eab308";
      return "#22c55e";
    };

    // ============================================================
    // STYLES
    // ============================================================
    const css = {
      app: { minHeight:"100vh", background:"#0f0f0f", color:"#e8e8e8", fontFamily:"'Inter',sans-serif", fontSize:"15px" },
      topbar: { background:"#1a1a1a", borderBottom:"1px solid #2a2a2a", padding:"0 16px", display:"flex", alignItems:"center", gap:"6px", height:"56px", position:"sticky", top:0, zIndex:100, overflowX:"auto" },
      logo: { color:"#22c55e", fontWeight:"700", fontSize:"15px", letterSpacing:"2px", whiteSpace:"nowrap", marginRight:"12px" },
      main: { padding:"20px", maxWidth:"1400px", margin:"0 auto" },
      card: { background:"#1a1a1a", border:"1px solid #2a2a2a", borderRadius:"10px", padding:"16px", marginBottom:"12px" },
      h2: { fontSize:"18px", fontWeight:"700", marginBottom:"18px" },
      grid: { display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))", gap:"12px" },
      input: { background:"#111", border:"1px solid #333", borderRadius:"6px", color:"#e8e8e8", padding:"8px 12px", fontFamily:"inherit", fontSize:"14px", width:"100%", boxSizing:"border-box" },
      select: { background:"#111", border:"1px solid #333", borderRadius:"6px", color:"#e8e8e8", padding:"8px 12px", fontFamily:"inherit", fontSize:"14px", width:"100%", boxSizing:"border-box" },
      btn: (c="#22c55e") => ({ background:`${c}22`, border:`1px solid ${c}`, borderRadius:"6px", color:c, padding:"8px 16px", cursor:"pointer", fontFamily:"inherit", fontSize:"14px", fontWeight:"600" }),
      tag: (c) => ({ display:"inline-block", padding:"3px 9px", borderRadius:"4px", fontSize:"12px", fontWeight:"700", background:`${c}22`, color:c, border:`1px solid ${c}44` }),
      modal: { position:"fixed", inset:0, background:"rgba(0,0,0,0.85)", zIndex:1000, display:"flex", alignItems:"center", justifyContent:"center", padding:"16px" },
      modalBox: { background:"#1a1a1a", border:"1px solid #333", borderRadius:"12px", padding:"24px", width:"100%", maxWidth:"460px", maxHeight:"90vh", overflowY:"auto" },
      label: { fontSize:"13px", color:"#888", marginBottom:"6px" },
      navBtn: (a) => ({ padding:"7px 14px", borderRadius:"6px", border: a?"1px solid #22c55e":"1px solid #2a2a2a", background: a?"rgba(34,197,94,0.15)":"transparent", color: a?"#22c55e":"#999", cursor:"pointer", fontSize:"13px", fontFamily:"inherit", whiteSpace:"nowrap", fontWeight: a?"600":"400" }),
    };

    // ============================================================
    // COMPONENTS
    // ============================================================
    function Bar({pct}) {
      const c = pctColor(pct);
      return h('div',{style:{height:"6px",borderRadius:"3px",background:"#2a2a2a",marginTop:"6px",overflow:"hidden"}},
        h('div',{style:{height:"100%",width:`${Math.min(pct||0,100)}%`,background:c,borderRadius:"3px",transition:"width 0.3s"}})
      );
    }

    function Modal({open,onClose,title,children}) {
      if(!open) return null;
      return h('div',{style:css.modal,onClick:onClose},
        h('div',{style:css.modalBox,onClick:e=>e.stopPropagation()},
          h('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"16px"}},
            h('div',{style:{fontWeight:"700"}},title),
            h('button',{style:css.btn("#666"),onClick:onClose},"✕")
          ),
          children
        )
      );
    }

    // ============================================================
    // BLOK 1 — KONTENERY
    // ============================================================
    function Kontenery({data,onUpdate}) {
      const [modal,setModal] = useState(null);
      const [pct,setPct] = useState("");
      const [status,setStatus] = useState("wolny");

      const open = (i) => { const d=data[i]||{}; setPct(d.pct??""); setStatus(d.status||"wolny"); setModal(i); };
      const handleStatus = (s) => {
        setStatus(s);
        if(s==="pełny") setPct(100);
        if(s==="wolny") setPct(0);
      };
      const save = () => {
        const p=parseInt(pct);
        onUpdate(modal,{pct:isNaN(p)?null:Math.min(100,Math.max(0,p)),status,updated:now()});
        setModal(null);
      };

      return h('div',null,
        h('div',{style:css.h2},"📦 KONTENERY ("+KONTENERY.length+" szt.)"),
        h('div',{style:css.grid},
          KONTENERY.map((name,i)=>{
            const d=data[i]||{};
            const c=pctColor(d.pct);
            return h('div',{key:i,onClick:()=>open(i),style:{...css.card,cursor:"pointer",borderColor:`${c}44`,background:`${c}11`,marginBottom:0}},
              h('div',{style:{fontWeight:"600",marginBottom:"6px",fontSize:"14px"}},name),
              h('div',{style:{display:"flex",gap:"6px",alignItems:"center"}},
                h('span',{style:css.tag(c)},`${d.pct??'—'}%`),
                d.status&&h('span',{style:css.tag("#555")},d.status)
              ),
              h(Bar,{pct:d.pct}),
              h('div',{style:{color:"#555",fontSize:"12px",marginTop:"4px"}},d.updated||"—")
            );
          })
        ),
        h(Modal,{open:modal!==null,onClose:()=>setModal(null),title:KONTENERY[modal]},
          h('div',{style:{marginBottom:"12px"}},
            h('div',{style:css.label},"Poziom wypełnienia (%)"),
            h('input',{style:css.input,type:"number",min:0,max:100,value:pct,onChange:e=>setPct(e.target.value)})
          ),
          h('div',{style:{marginBottom:"16px"}},
            h('div',{style:css.label},"Status"),
            h('select',{style:css.select,value:status,onChange:e=>handleStatus(e.target.value)},
              STATUSY.map(s=>h('option',{key:s},s))
            )
          ),
          h('button',{style:css.btn(),onClick:save},"💾 Zapisz")
        )
      );
    }

    // ============================================================
    // BLOK 2 — WORKI
    // ============================================================
    function Worki({data,onUpdate}) {
      const [modal,setModal] = useState(null);
      const [pct,setPct] = useState("");
      const [status,setStatus] = useState("wolny");

      const open = (i) => { const d=data[i]||{}; setPct(d.pct??""); setStatus(d.status||"wolny"); setModal(i); };
      const handleStatus = (s) => {
        setStatus(s);
        if(s==="pełny") setPct(100);
        if(s==="wolny") setPct(0);
      };
      const save = () => {
        const p=parseInt(pct);
        onUpdate(modal,{pct:isNaN(p)?null:Math.min(100,Math.max(0,p)),status,updated:now()});
        setModal(null);
      };

      return h('div',null,
        h('div',{style:css.h2},"🛍️ WORKI NA ODPADY ("+WORKI.length+" szt.)"),
        h('div',{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:"12px"}},
          WORKI.map((name,i)=>{
            const d=data[i]||{};
            const c=pctColor(d.pct);
            return h('div',{key:i,onClick:()=>open(i),style:{...css.card,cursor:"pointer",borderColor:`${c}44`,background:`${c}11`,marginBottom:0}},
              h('div',{style:{fontWeight:"600",marginBottom:"8px",fontSize:"14px"}},name),
              h('div',{style:{display:"flex",gap:"6px"}},
                h('span',{style:css.tag(c)},`${d.pct??'—'}%`),
                d.status&&h('span',{style:css.tag("#555")},d.status)
              ),
              h(Bar,{pct:d.pct}),
              h('div',{style:{color:"#555",fontSize:"12px",marginTop:"4px"}},d.updated||"—")
            );
          })
        ),
        h(Modal,{open:modal!==null,onClose:()=>setModal(null),title:WORKI[modal]},
          h('div',{style:{marginBottom:"12px"}},
            h('div',{style:css.label},"Poziom wypełnienia (%)"),
            h('input',{style:css.input,type:"number",min:0,max:100,value:pct,onChange:e=>setPct(e.target.value)})
          ),
          h('div',{style:{marginBottom:"16px"}},
            h('div',{style:css.label},"Status"),
            h('select',{style:css.select,value:status,onChange:e=>handleStatus(e.target.value)},
              STATUSY.map(s=>h('option',{key:s},s))
            )
          ),
          h('button',{style:css.btn(),onClick:save},"💾 Zapisz")
        )
      );
    }

    // ============================================================
    // BLOK 3 — STREFY
    // ============================================================
    function Strefy({data,onUpdate}) {
      const [modal,setModal] = useState(null);
      const [pct,setPct] = useState("");
      const [qty,setQty] = useState("");
      const [comment,setComment] = useState("");

      const open = (i) => { const d=data[i]||{}; setPct(d.pct??""); setQty(d.qty||""); setComment(d.comment||""); setModal(i); };
      const save = () => {
        const p=parseInt(pct);
        onUpdate(modal,{pct:isNaN(p)?null:Math.min(100,Math.max(0,p)),qty,comment,updated:now()});
        setModal(null);
      };

      return h('div',null,
        h('div',{style:css.h2},"🗺️ STREFY PLACU (14 szt.)"),
        h('div',{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:"10px"}},
          STREFY.map((name,i)=>{
            const d=data[i]||{};
            const c=pctColor(d.pct);
            return h('div',{key:i,onClick:()=>open(i),style:{...css.card,cursor:"pointer",borderColor:`${c}44`,background:`${c}11`,marginBottom:0}},
              h('div',{style:{display:"flex",justifyContent:"space-between",marginBottom:"4px"}},
                h('div',{style:{fontWeight:"600",fontSize:"12px",flex:1}},name),
                h('span',{style:css.tag(c)},`${d.pct??'—'}%`)
              ),
              d.qty&&h('div',{style:{color:"#888",fontSize:"11px"}},"Szt.: ",d.qty),
              d.comment&&h('div',{style:{color:"#666",fontSize:"11px",marginTop:"2px"}},d.comment),
              h(Bar,{pct:d.pct}),
              h('div',{style:{color:"#444",fontSize:"10px",marginTop:"4px"}},d.updated||"—")
            );
          })
        ),
        h(Modal,{open:modal!==null,onClose:()=>setModal(null),title:STREFY[modal]},
          h('div',{style:{marginBottom:"10px"}},h('div',{style:css.label},"Poziom (%)"),h('input',{style:css.input,type:"number",min:0,max:100,value:pct,onChange:e=>setPct(e.target.value)})),
          h('div',{style:{marginBottom:"10px"}},h('div',{style:css.label},"Liczba jednostek"),h('input',{style:css.input,value:qty,onChange:e=>setQty(e.target.value),placeholder:"np. 12 palet"})),
          h('div',{style:{marginBottom:"16px"}},h('div',{style:css.label},"Komentarz"),h('textarea',{style:{...css.input,minHeight:"60px"},value:comment,onChange:e=>setComment(e.target.value)})),
          h('button',{style:css.btn(),onClick:save},"💾 Zapisz")
        )
      );
    }

    // ============================================================
    // BLOK 4 — SZAFKA ODPADÓW NIEBEZPIECZNYCH
    // ============================================================
    const SZAFKA_POLKI = ["Półka 1","Półka 2"];

    function SzafkaNiebezpiecznych({data, onUpdate}) {
      const polki = data.polki || {};
      const [modal, setModal] = useState(null);
      const [pct, setPct] = useState("");
      const [qty, setQty] = useState("");
      const [comment, setComment] = useState("");

      const getPolka = (i) => polki[i] || {};

      const open = (i) => {
        const d = getPolka(i);
        setPct(d.pct ?? "");
        setQty(d.qty || "");
        setComment(d.comment || "");
        setModal(i);
      };

      const save = () => {
        const p = parseInt(pct);
        const updated = {...polki, [modal]: {pct: isNaN(p) ? null : Math.min(100, Math.max(0, p)), qty, comment, updated: now()}};
        onUpdate({...data, polki: updated});
        setModal(null);
      };

      return h('div', null,
        h('div', {style:css.h2}, "⚠️ SZAFKA ODPADÓW NIEBEZPIECZNYCH"),
        h('div', {style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:"12px"}},
          SZAFKA_POLKI.map((name, i) => {
            const d = getPolka(i);
            const c = pctColor(d.pct);
            return h('div', {key:i, onClick:()=>open(i), style:{...css.card,cursor:"pointer",borderColor:`${c}44`,background:`${c}11`,marginBottom:0}},
              h('div', {style:{display:"flex",justifyContent:"space-between",marginBottom:"4px"}},
                h('div', {style:{fontWeight:"600",fontSize:"14px"}}, name),
                h('span', {style:css.tag(c)}, `${d.pct ?? '—'}%`)
              ),
              d.qty && h('div', {style:{color:"#888",fontSize:"12px"}}, "Szt.: ", d.qty),
              d.comment && h('div', {style:{color:"#666",fontSize:"11px",marginTop:"2px"}}, d.comment),
              h(Bar, {pct: d.pct}),
              h('div', {style:{color:"#444",fontSize:"10px",marginTop:"4px"}}, d.updated || "—")
            );
          })
        ),
        h(Modal, {open:modal!==null, onClose:()=>setModal(null), title:SZAFKA_POLKI[modal]},
          h('div', {style:{marginBottom:"10px"}},
            h('div', {style:css.label}, "Poziom wypełnienia (%)"),
            h('input', {style:css.input, type:"number", min:0, max:100, value:pct, onChange:e=>setPct(e.target.value)})
          ),
          h('div', {style:{marginBottom:"10px"}},
            h('div', {style:css.label}, "Liczba jednostek (szt.)"),
            h('input', {style:css.input, value:qty, onChange:e=>setQty(e.target.value), placeholder:"np. 5"})
          ),
          h('div', {style:{marginBottom:"16px"}},
            h('div', {style:css.label}, "Komentarz"),
            h('textarea', {style:{...css.input,minHeight:"60px"}, value:comment, onChange:e=>setComment(e.target.value), placeholder:"np. oleje, baterie..."})
          ),
          h('button', {style:css.btn(), onClick:save}, "💾 Zapisz")
        )
      );
    }

    // ============================================================
    // BLOK 5 — WÓZKI
    // ============================================================
    function Wozki({data,onUpdate}) {
      const [modal,setModal] = useState(null);
      const [status,setStatus] = useState("sprawny");
      const [note,setNote] = useState("");
      const wozki = data.list || [{name:"Wózek widłowy №1",status:"sprawny",notes:[]},{name:"Wózek widłowy №2",status:"sprawny",notes:[]}];
      const sc = {sprawny:"#22c55e","w naprawie":"#ef4444","wymaga serwisu":"#f97316"};

      const open = (i) => { setStatus(wozki[i].status||"sprawny"); setNote(""); setModal(i); };
      const save = () => {
        const updated=[...wozki];
        const notes=note?[...(updated[modal].notes||[]),{text:note,time:now()}]:updated[modal].notes||[];
        updated[modal]={...updated[modal],status,notes};
        onUpdate("list",updated);
        setModal(null);
      };

      return h('div',null,
        h('div',{style:css.h2},"🚜 WÓZKI WIDŁOWE"),
        h('div',{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:"10px"}},
          wozki.map((w,i)=>h('div',{key:i,onClick:()=>open(i),style:{...css.card,cursor:"pointer",borderColor:`${sc[w.status]||"#333"}44`,marginBottom:0}},
            h('div',{style:{fontWeight:"700",marginBottom:"8px"}},w.name),
            h('span',{style:css.tag(sc[w.status]||"#888")},w.status),
            (w.notes||[]).slice(-1).map((n,j)=>h('div',{key:j,style:{color:"#555",fontSize:"11px",marginTop:"6px"}},"📝 ",n.text))
          ))
        ),
        h(Modal,{open:modal!==null,onClose:()=>setModal(null),title:wozki[modal]?.name},
          h('div',{style:{marginBottom:"10px"}},h('div',{style:css.label},"Status"),
            h('select',{style:css.select,value:status,onChange:e=>setStatus(e.target.value)},
              ["sprawny","w naprawie","wymaga serwisu"].map(s=>h('option',{key:s},s))
            )
          ),
          h('div',{style:{marginBottom:"16px"}},h('div',{style:css.label},"Nowa notatka"),h('input',{style:css.input,value:note,onChange:e=>setNote(e.target.value),placeholder:"Dodaj notatkę..."})),
          h('button',{style:css.btn(),onClick:save},"💾 Zapisz")
        )
      );
    }

    // ============================================================
    // BLOK 6 — BUTLE
    // ============================================================
    function Butle({data,onUpdate}) {
      const [full,setFull] = useState(data.full??0);
      const [empty,setEmpty] = useState(data.empty??0);
      const [low,setLow] = useState(data.threshLow??5);
      const [crit,setCrit] = useState(data.threshCrit??2);
      const c = data.full<=(data.threshCrit??2)?"#ef4444":data.full<=(data.threshLow??5)?"#eab308":"#22c55e";

      const save = () => onUpdate({full:parseInt(full)||0,empty:parseInt(empty)||0,threshLow:parseInt(low)||5,threshCrit:parseInt(crit)||2,updated:now()});

      return h('div',null,
        h('div',{style:css.h2},"🔵 BUTLE GAZOWE"),
        h('div',{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:"10px",marginBottom:"16px"}},
          h('div',{style:{...css.card,borderColor:`${c}44`,background:`${c}11`,textAlign:"center",marginBottom:0}},
            h('div',{style:{fontSize:"40px",fontWeight:"900",color:c}},data.full??0),
            h('div',{style:{color:"#888"}},"Pełnych butli"),
            (data.full??0)<=(data.threshCrit??2)&&h('div',{style:{...css.tag("#ef4444"),marginTop:"8px",display:"block"}},"⚠️ KRYTYCZNIE MAŁO")
          ),
          h('div',{style:{...css.card,textAlign:"center",marginBottom:0}},
            h('div',{style:{fontSize:"40px",fontWeight:"900",color:"#555"}},data.empty??0),
            h('div',{style:{color:"#888"}},"Pustych butli")
          )
        ),
        h('div',{style:css.card},
          h('div',{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:"8px",marginBottom:"12px"}},
            h('div',null,h('div',{style:css.label},"Pełnych"),h('input',{style:css.input,type:"number",value:full,onChange:e=>setFull(e.target.value)})),
            h('div',null,h('div',{style:css.label},"Pustych"),h('input',{style:css.input,type:"number",value:empty,onChange:e=>setEmpty(e.target.value)})),
            h('div',null,h('div',{style:css.label},"Próg mało"),h('input',{style:css.input,type:"number",value:low,onChange:e=>setLow(e.target.value)})),
            h('div',null,h('div',{style:css.label},"Próg kryt."),h('input',{style:css.input,type:"number",value:crit,onChange:e=>setCrit(e.target.value)}))
          ),
          h('button',{style:css.btn(),onClick:save},"💾 Zapisz")
        )
      );
    }

    // ============================================================
    // BLOK 7 — PRACOWNICY
    // ============================================================
    const DEFAULT_PRACOWNICY = [
      {name:"Pracownik 1",role:"I zmiana (06:00–14:00)",phone:"",whatsapp:"",rating:"średnio",info:"Pon–Pt"},
      {name:"Pracownik 2",role:"I zmiana (06:00–14:00)",phone:"",whatsapp:"",rating:"średnio",info:"Pon–Pt"},

        if(e>s) return nowMins>=s && nowMins<e;

    function Planer({kontenery,worki,strefy,done,onToggle}) {

      STREFY.forEach((name,i)=>{ const d=strefy[i]||{}; if((d.pct||0)>=60) tasks.push({name,pct:d.pct,id:`s${i}`,cat:"Strefa"}); });
      tasks.sort((a,b)=>b.pct-a.pct);
      const today=tasks.filter(t=>t.pct>=80);

        h('div',{style:css.h2},"📋 PLANER WYMIAN I ZAŁADUNKÓW"),

            h('div',{style:{fontSize:"11px",color:"#eab308",letterSpacing:"1px",textTransform:"uppercase",marginBottom:"12px"}},"🕐 PLAN NA JUTRO (60-79%)"),

    // ============================================================
    // BLOK 8 — GRAFIK PRACY

    // Punkt referencyjny rotacji: tydzień 1 = niedziela 1 marca 2026
    // Rotacja jest GLOBALNA i ciągła przez wszystkie miesiące
    const ROTATION_REF = new Date(2026, 2, 1); // 1 marca 2026

    // Zwraca globalny numer tygodnia rotacji (0-based) dla danej daty
    // Tydzień zaczyna się w niedzielę (jak w grafiku — niedziela = start nocnej)
    const getRotationWeek = (year, month, day) => {
      const date = new Date(year, month, day);
      // Znajdź poprzednią niedzielę (lub tę samą datę jeśli to niedziela)
      const dow = date.getDay(); // 0=niedziela
      const sunday = new Date(date);
      sunday.setDate(date.getDate() - dow);
      // Liczba tygodni od punktu referencyjnego
      const diffMs = sunday - ROTATION_REF;
      const diffWeeks = Math.floor(diffMs / (7 * 24 * 60 * 60 * 1000));
      return diffWeeks;
    };

    // Generuje grafik dla dowolnego roku i miesiąca
    const generateSchedule = (year, month) => {
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const schedule = [];

      for(let wi = 0; wi < 6; wi++) {
        const days = {};
        for(let d = 1; d <= daysInMonth; d++) {
          const dow = new Date(year, month, d).getDay(); // 0=nd, 6=sb
          const rotWeek = getRotationWeek(year, month, d);
          const isEvenRot = (rotWeek % 2 === 0);

          if(wi < 2) {
            // Pracownicy 1,2 — tylko I zmiana pn-pt
            if(dow >= 1 && dow <= 5) {
              days[d] = {type:'praca', start:'06:00', end:'14:00'};
            } else {
              days[d] = {type:'wolny'};
            }
          } else {
            // Pracownicy 3,4 (wi=2,3): parzyste tygodnie=III nocna, nieparzyste=II dzienna
            // Pracownicy 5,6 (wi=4,5): odwrotnie
            const isNight34 = isEvenRot;
            const isNight56 = !isEvenRot;
            const isNight = wi < 4 ? isNight34 : isNight56;

            if(dow === 0) {
              // Niedziela — nocna zmiana ZACZYNA się o 22:00
              if(isNight) {
                days[d] = {type:'praca', start:'22:00', end:'06:00', note:'start nocnej'};
              } else {
                days[d] = {type:'wolny'};
              }
            } else if(dow === 6) {
              // Sobota — nocna zmiana KOŃCZY się o 06:00
              // Sprawdzamy czy w piątek (d-1) była nocna
              const rotFri = getRotationWeek(year, month, d - 1 > 0 ? d - 1 : 1);
              const isEvenFri = (rotFri % 2 === 0);
              const wasNight34 = isEvenFri;
              const wasNight56 = !isEvenFri;
              const wasNight = wi < 4 ? wasNight34 : wasNight56;
              if(wasNight) {
                days[d] = {type:'praca', start:'00:00', end:'06:00', note:'koniec nocnej'};
              } else {
                days[d] = {type:'wolny'};
              }
            } else {
              // Pn-Pt
              if(isNight) {
                days[d] = {type:'praca', start:'22:00', end:'06:00'};
              } else {
                days[d] = {type:'praca', start:'14:00', end:'22:00'};
              }
            }
          }
        }
        schedule.push({days});
      }
      return schedule;
    };

    const MONTH_NAMES_PL = ["Styczeń","Luty","Marzec","Kwiecień","Maj","Czerwiec","Lipiec","Sierpień","Wrzesień","Październik","Listopad","Grudzień"];

    function GrafikPracy({pracownicy, grafik, onUpdate}) {
      const rawList = pracownicy.list || [];
      const list = Array.from({length:6},(_,i) => rawList[i] || DEFAULT_PRACOWNICY[i]);
      const [tick,setTick] = useState(0);
      useEffect(()=>{ const t=setInterval(()=>setTick(n=>n+1),60000); return ()=>clearInterval(t); },[]);

      const todayYear = getWarsawYear();
      const todayMonth = getWarsawMonth();
      const todayDay = getWarsawDay();
      const nowMins = getWarsawMins();

      const [viewYear, setViewYear] = useState(todayYear);
      const [viewMonth, setViewMonth] = useState(todayMonth);

      const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
      const isCurrentMonth = viewYear === todayYear && viewMonth === todayMonth;

      const prevMonth = () => {
        if(viewMonth === 0) { setViewYear(y=>y-1); setViewMonth(11); }
        else setViewMonth(m=>m-1);
      };
      const nextMonth = () => {
        if(viewMonth === 11) { setViewYear(y=>y+1); setViewMonth(0); }
        else setViewMonth(m=>m+1);
      };

      const defaultSchedule = generateSchedule(viewYear, viewMonth);

      const fbKey = (wi, d) => `g_${viewYear}_${viewMonth}_${wi}_${d}`;

      const getDay = (wi, d) => {
        const saved = grafik[fbKey(wi, d)];
        if(saved !== undefined) return saved;
        return defaultSchedule[wi]?.days[d] || {type:'wolny'};
      };

      const calcH = (start, end) => {
        if(!start||!end) return 0;
        const [sh,sm]=start.split(':').map(Number);
        const [eh,em]=end.split(':').map(Number);
        let mins = (eh*60+em)-(sh*60+sm);
        if(mins<0) mins+=24*60;
        return (mins/60).toFixed(1);
      };

      const totalH = (wi) => {
        let t=0;
        for(let d=1;d<=daysInMonth;d++){
          const day=getDay(wi,d);
          if(day.type==='praca'&&day.start&&day.end) t+=parseFloat(calcH(day.start,day.end));
        }
        return t.toFixed(1);
      };

      const saveDay = (wi, d, val) => {
        onUpdate(fbKey(wi, d), val);
      };

      const [editDay, setEditDay] = useState({});
      const [editModal, setEditModal] = useState(null);

      const openDayModal = (wi, d) => {
        setEditDay({...getDay(wi,d), wi, d});
        setEditModal(true);
      };

      const saveDayModal = () => {
        const {wi, d, ...rest} = editDay;
        saveDay(wi, d, rest);
        setEditModal(null);
      };

      const dowName = (d) => {
        const names = ['Nd','Pn','Wt','Śr','Cz','Pt','Sb'];
        return names[new Date(viewYear, viewMonth, d).getDay()];
      };

      const shiftColor = (day) => {
        if(!day||day.type==='wolny') return '#555';
        if(day.start==='06:00') return '#22c55e';
        if(day.start==='14:00') return '#eab308';
        if(day.start==='22:00') return '#60a5fa';
        return '#888';
      };

      const isOnShiftToday = (wi) => {
        if(!isCurrentMonth) return false;
        const todaySched = generateSchedule(todayYear, todayMonth);
        const savedKey = `g_${todayYear}_${todayMonth}_${wi}_${todayDay}`;
        const saved = grafik[savedKey];
        const day = saved !== undefined ? saved : todaySched[wi]?.days[todayDay];
        if(!day||day.type!=='praca'||!day.start||!day.end) {
          if(nowMins < 6*60 && todayDay > 1) {
            const savedYKey = `g_${todayYear}_${todayMonth}_${wi}_${todayDay-1}`;
            const savedY = grafik[savedYKey];
            const dayY = savedY !== undefined ? savedY : todaySched[wi]?.days[todayDay-1];
            if(dayY?.type==='praca'&&dayY?.start==='22:00') return true;
          }
          return false;
        }
        const [sh,sm]=day.start.split(':').map(Number);
        const [eh,em]=day.end.split(':').map(Number);
        const s=sh*60+sm, e=eh*60+em;
        if(e>s) return nowMins>=s && nowMins<e;
        if(nowMins>=s) return true;
        if(nowMins<6*60 && todayDay > 1) {
          const savedYKey = `g_${todayYear}_${todayMonth}_${wi}_${todayDay-1}`;
          const savedY = grafik[savedYKey];
          const dayY = savedY !== undefined ? savedY : todaySched[wi]?.days[todayDay-1];
          if(dayY?.type==='praca'&&dayY?.start==='22:00') return true;
        }
        return false;
      };

      return h('div',null,
        // Nagłówek z nawigacją
        h('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"}},
          h('div',{style:{...css.h2,marginBottom:0}},`📅 GRAFIK PRACY`),
          h('div',{style:{display:"flex",gap:"6px",alignItems:"center"}},
            h('button',{style:{...css.btn("#555"),padding:"6px 12px",fontSize:"16px"},onClick:prevMonth},"◀"),
            h('div',{style:{textAlign:"center",minWidth:"160px"}},
              h('div',{style:{color:"#e8e8e8",fontWeight:"700",fontSize:"15px"}},`${MONTH_NAMES_PL[viewMonth]} ${viewYear}`),
              isCurrentMonth && h('div',{style:{color:"#22c55e",fontSize:"11px"}},`▶ bieżący miesiąc`)
            ),
            h('button',{style:{...css.btn("#555"),padding:"6px 12px",fontSize:"16px"},onClick:nextMonth},"▶"),
            !isCurrentMonth && h('button',{style:{...css.btn("#22c55e"),fontSize:"12px",padding:"6px 10px"},onClick:()=>{setViewYear(todayYear);setViewMonth(todayMonth);}},"Dziś")
          )
        ),
        h('div',{style:{color:"#666",fontSize:"13px",marginBottom:"16px"}},`${daysInMonth} dni · Kliknij na dzień aby edytować`),

        list.length===0 && h('div',{style:{...css.card,color:"#666"}},"Dodaj pracowników w zakładce 👷 Pracownicy"),

        list.map((p,wi)=>{
          const onShift = isOnShiftToday(wi);
          const shiftC = onShift ? "#22c55e" : "#555";
          return h('div',{key:wi,style:{...css.card,marginBottom:"12px"}},
            h('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px"}},
              h('div',null,
                h('div',{style:{fontWeight:"700",fontSize:"15px"}},p.name||`Pracownik ${wi+1}`),

    function Podsumowanie({kontenery,worki,strefy,wozki,butle,pracownicy,notatki,grafik}) {
      const todayDay = getWarsawDay();
      const todayMonth = getWarsawMonth();
      const todayYear = getWarsawYear();
      const nowMins = getWarsawMins();

      const isShiftActiveNow = (day) => {
        if(!day||day.type!=='praca'||!day.start||!day.end) return false;
        const [sh,sm]=day.start.split(':').map(Number);
        const [eh,em]=day.end.split(':').map(Number);
        const startMins=sh*60+sm;
        const endMins=eh*60+em;
        if(endMins>startMins) return nowMins>=startMins && nowMins<endMins;
        return nowMins>=startMins;
      };

      const isOnShift = (wi) => {
        const sched = generateSchedule(todayYear, todayMonth);
        const savedKey = `g_${todayYear}_${todayMonth}_${wi}_${todayDay}`;
        const saved = grafik[savedKey];
        const day = saved !== undefined ? saved : sched[wi]?.days[todayDay];
        if(isShiftActiveNow(day)) return true;
        if(nowMins < 6*60 && todayDay > 1) {
          const savedYKey = `g_${todayYear}_${todayMonth}_${wi}_${todayDay-1}`;
          const savedY = grafik[savedYKey];
          const dayY = savedY !== undefined ? savedY : sched[wi]?.days[todayDay-1];
          if(dayY?.type==='praca'&&dayY?.start==='22:00') return true;
        }
        return false;
      };

      const fullList = Array.from({length:6},(_,i) => (pracownicy.list||[])[i] || DEFAULT_PRACOWNICY[i]);
      const onSmienie = fullList.filter((_,i)=>isOnShift(i));
      const pilne=KONTENERY.filter((_,i)=>(kontenery[i]?.pct||0)>=80).length+WORKI.filter((_,i)=>(worki[i]?.pct||0)>=80).length+STREFY.filter((_,i)=>(strefy[i]?.pct||0)>=80).length;
      const butleC=(butle.full??0)<=(butle.threshCrit??2)?"#ef4444":(butle.full??0)<=(butle.threshLow??5)?"#eab308":"#22c55e";

      return h('div',null,
        h('div',{style:css.h2},"🏠 PODSUMOWANIE ZMIANY"),
        pilne>0&&h('div',{style:{...css.card,borderColor:"#ef4444",background:"rgba(239,68,68,0.1)",marginBottom:"12px"}},
          h('div',{style:{color:"#ef4444",fontWeight:"700",fontSize:"15px"}},"⚠️ "+pilne+" obiektów wymaga pilnej wymiany (≥80%)")
        ),
        (butle.full??0)<=(butle.threshLow??5)&&h('div',{style:{...css.card,borderColor:butleC,background:`${butleC}11`,marginBottom:"12px"}},
          h('div',{style:{color:butleC,fontWeight:"700",fontSize:"15px"}},"🔵 Butle gazowe: tylko "+(butle.full??0)+" pełnych")
        ),
        h('div',{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(320px,1fr))",gap:"12px"}},
          h('div',{style:css.card},
            h('div',{style:{fontSize:"13px",color:"#555",letterSpacing:"1px",textTransform:"uppercase",marginBottom:"10px",fontWeight:"600"}},"📦 KONTENERY"),
            KONTENERY.map((n,i)=>{const d=kontenery[i]||{};const c=pctColor(d.pct);return h('div',{key:i,style:{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:"1px solid #1a1a1a"}},h('div',{style:{fontSize:"13px",color:"#bbb"}},n),h('span',{style:{color:c,fontSize:"13px",fontWeight:"700"}},`${d.pct??'—'}%`));})
          ),
          h('div',{style:css.card},
            h('div',{style:{fontSize:"13px",color:"#555",letterSpacing:"1px",textTransform:"uppercase",marginBottom:"10px",fontWeight:"600"}},"🛍️ WORKI"),
            WORKI.map((n,i)=>{const d=worki[i]||{};const c=pctColor(d.pct);return h('div',{key:i,style:{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:"1px solid #1a1a1a"}},h('div',{style:{fontSize:"13px",color:"#bbb"}},n),h('span',{style:{color:c,fontSize:"13px",fontWeight:"700"}},`${d.pct??'—'}%`));})
          ),
          h('div',{style:css.card},
            h('div',{style:{fontSize:"13px",color:"#555",letterSpacing:"1px",textTransform:"uppercase",marginBottom:"10px",fontWeight:"600"}},"🗺️ STREFY PLACU"),
            STREFY.map((n,i)=>{const d=strefy[i]||{};const c=pctColor(d.pct);return h('div',{key:i,style:{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:"1px solid #1a1a1a"}},h('div',{style:{fontSize:"13px",color:"#bbb",flex:1,paddingRight:"8px"}},n),h('span',{style:{color:c,fontSize:"13px",fontWeight:"700",whiteSpace:"nowrap"}},`${d.pct??'—'}%`));})
          ),

            h('div',{style:{...css.card,marginBottom:"12px"}},
              h('div',{style:{fontSize:"13px",color:"#555",letterSpacing:"1px",textTransform:"uppercase",marginBottom:"8px",fontWeight:"600"}},"👷 NA ZMIANIE"),
              onSmienie.length===0?h('div',{style:{color:"#555"}},"Brak"):onSmienie.map((p,i)=>h('div',{key:i,style:{color:"#22c55e",fontSize:"14px",padding:"2px 0"}},"✓ ",p.name))
            ),

              h('div',{style:{fontSize:"26px",fontWeight:"700",color:butleC}},butle.full??0," pełnych"),

              })
            )
          )
        ),
        notatki.length>0&&h('div',{style:{...css.card,marginTop:"12px"}},
          h('div',{style:{fontSize:"13px",color:"#555",letterSpacing:"1px",textTransform:"uppercase",marginBottom:"10px",fontWeight:"600"}},"📝 OSTATNIE NOTATKI"),
          [...notatki].slice(-3).reverse().map((n,i)=>h('div',{key:i,style:{padding:"6px 0",borderBottom:"1px solid #1a1a1a"}},

    function HistoriaRaporty({kontenery,worki,strefy,wozki,butle,pracownicy,notatki,szafka,snapshots}) {
      const [activeTab, setActiveTab] = useState("snapshots");
      const [exportMsg, setExportMsg] = useState("");

      // Generuj bieżący raport stanu
      const genRaportDane = () => {
        const pilne = [];
        const planNaJutro = [];
        const ok = [];

        KONTENERY.forEach((n,i)=>{ const p=kontenery[i]?.pct||0; const obj={name:n,pct:p,typ:"Kontener"}; if(p>=80) pilne.push(obj); else if(p>=60) planNaJutro.push(obj); else ok.push(obj); });
        WORKI.forEach((n,i)=>{ const p=worki[i]?.pct||0; const obj={name:n,pct:p,typ:"Worek"}; if(p>=80) pilne.push(obj); else if(p>=60) planNaJutro.push(obj); else ok.push(obj); });
        STREFY.forEach((n,i)=>{ const p=strefy[i]?.pct||0; const obj={name:n,pct:p,typ:"Strefa"}; if(p>=80) pilne.push(obj); else if(p>=60) planNaJutro.push(obj); else ok.push(obj); });

        return {pilne, planNaJutro, ok};
      };

      const exportCSV = () => {
        const lines = ["Typ,Nazwa,Poziom (%),Status"];
        KONTENERY.forEach((n,i)=>{ const p=kontenery[i]?.pct??"—"; const s=kontenery[i]?.status||"—"; const upd=kontenery[i]?.updated||"—"; lines.push(`Kontener,"${n}",${p},"${s}","${upd}"`); });
        WORKI.forEach((n,i)=>{ const p=worki[i]?.pct??"—"; const s=worki[i]?.status||"—"; const upd=worki[i]?.updated||"—"; lines.push(`Worek,"${n}",${p},"${s}","${upd}"`); });
        STREFY.forEach((n,i)=>{ const p=strefy[i]?.pct??"—"; const upd=strefy[i]?.updated||"—"; lines.push(`Strefa,"${n}",${p},"—","${upd}"`); });
        const wList = wozki.list || [];
        wList.forEach(w=>lines.push(`Wózek,"${w.name}","—","${w.status}","—"`));
        lines.push(`Butle pełne,—,${butle.full||0},"—","${butle.updated||"—"}"`);

        const notatki_lines = ["\nNotatki (ostatnie 20):","Czas,Treść"];
        notatki.slice(-20).reverse().forEach(n=>notatki_lines.push(`"${n.time}","${n.text.replace(/"/g,'""')}"`));

        const csv = [...lines,...notatki_lines].join("\n");
        const blob = new Blob(["\uFEFF"+csv], {type:"text/csv;charset=utf-8;"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `plac-odpadow-${new Date().toISOString().slice(0,10)}.csv`;
        a.click();
        URL.revokeObjectURL(url);
        setExportMsg("✅ Eksport gotowy!");
        setTimeout(()=>setExportMsg(""),3000);
      };

      const {pilne, planNaJutro, ok} = genRaportDane();

      // Statystyki globalne
      const allItems = [...pilne,...planNaJutro,...ok];
      const avgPct = allItems.length ? Math.round(allItems.reduce((s,x)=>s+(x.pct||0),0)/allItems.length) : 0;

      const StatBar = ({label, value, max, color}) => h('div', {style:{marginBottom:"10px"}},

          h('div', {style:css.h2}, "📊 HISTORIA I RAPORTY"),
          h('button', {style:{...css.btn("#22c55e"),fontSize:"13px"}, onClick:exportCSV}, "⬇️ Eksport CSV")
        ),

    function AgentAI({kontenery,worki,strefy,wozki,butle,pracownicy,notatki,baza,snapshots}) {
      const [loading,setLoading] = useState(false);
      const [response,setResponse] = useState(null);
      const [error,setError] = useState(null);
      const [model,setModel] = useState(()=>localStorage.getItem("ai_model")||"groq");
      const [fbGroqKey,setFbGroqKey] = useState("");
      const [fbClaudeKey,setFbClaudeKey] = useState("");
      const [keysLoaded,setKeysLoaded] = useState(false);
      const [adminOpen,setAdminOpen] = useState(false);
      const [adminPass,setAdminPass] = useState("");
      const [adminAuth,setAdminAuth] = useState(false);
      const [adminError,setAdminError] = useState(false);
      const [editGroq,setEditGroq] = useState("");
      const [editClaude,setEditClaude] = useState("");
      const [saveMsg,setSaveMsg] = useState("");

      useEffect(()=>{
        onValue(ref(db,"config/groqKey"),snap=>{ const v=snap.val()||""; setFbGroqKey(v); setEditGroq(v); });
        onValue(ref(db,"config/claudeKey"),snap=>{ const v=snap.val()||""; setFbClaudeKey(v); setEditClaude(v); setKeysLoaded(true); });
      },[]);

      const tryAdminLogin = () => {
        if(adminPass==="plac2026"){ setAdminAuth(true); setAdminError(false); }
        else { setAdminError(true); setTimeout(()=>setAdminError(false),2000); }
      };

      const saveKeys = () => {
        set(ref(db,"config/groqKey"),editGroq.trim());
        set(ref(db,"config/claudeKey"),editClaude.trim());
        setSaveMsg("\u2705 Klucze zapisane!"); setTimeout(()=>setSaveMsg(""),3000);
      };

      const analyze = async () => {
        setLoading(true); setError(null); setResponse(null);
        const activeKey = model==="groq" ? fbGroqKey : fbClaudeKey;
        if(!activeKey||activeKey.trim().length<10) {
          setError("Brak klucza API. Administrator musi skonfigurowa\u0107 klucz w panelu \u2699\ufe0f.");
          setLoading(false); return;
        }
        const summary = {
          kontenery: KONTENERY.map((n,i)=>({name:n,...kontenery[i]})),
          worki: WORKI.map((n,i)=>({name:n,...worki[i]})),
          strefy: STREFY.map((n,i)=>({name:n,...strefy[i]})),
          wozki: wozki.list||[],

        };
        const histSummary = (snapshots||[]).slice(0,30).map(s=>({
          date: s.date, avgPct: s.avgPct, pilneCount: s.pilneCount,

        const hasHistory = histSummary.length > 1;
        const historyBlock = hasHistory
          ? `\n\nHISTORIA PLACU (ostatnie ${histSummary.length} dni):\n${JSON.stringify(histSummary,null,2)}`

        (model==="claude" && fbClaudeKey.trim().length>10)

          )

          h('button',{style:{...css.btn(model==="groq"?"#f97316":"#555"),fontSize:"13px"},onClick:()=>{ setModel("groq"); localStorage.setItem("ai_model","groq"); }},

    // ============================================================
    // GŁÓWNA APLIKACJA
    // ============================================================
    function App() {
      const [tab,setTab] = useState("podsumowanie");
      const [kontenery,setKontenery] = useState({});
      const [worki,setWorki] = useState({});
      const [strefy,setStrefy] = useState({});
      const [wozki,setWozki] = useState({});
      const [butle,setButle] = useState({});
      const [pracownicy,setPracownicy] = useState({});
      const [planerDone,setPlanerDone] = useState({});
      const [grafik,setGrafik] = useState({});
      const [notatki,setNotatki] = useState([]);
      const [baza,setBaza] = useState([]);
      const [szafka,setSzafka] = useState({});
      const [snapshots,setSnapshots] = useState([]);
      const dataRef = useRef({});

      useEffect(()=>{
        [["kontenery",setKontenery],["worki",setWorki],["strefy",setStrefy],["wozki",setWozki],["butle",setButle],["pracownicy",setPracownicy],["planerDone",setPlanerDone],["grafik",setGrafik],["szafka",setSzafka]].forEach(([p,s])=>{
          onValue(ref(db,p),snap=>{ const v=snap.val(); if(v){ s(v); dataRef.current[p]=v; } });
        });
        onValue(ref(db,"notatki"),snap=>{ const v=snap.val(); const arr=v?Object.values(v):[]; setNotatki(arr); dataRef.current.notatki=arr; });
        onValue(ref(db,"baza"),snap=>{ const v=snap.val(); const arr=v?Object.entries(v).map(([id,val])=>({...val,_id:id})):[]; setBaza(arr); dataRef.current.baza=arr; });
        onValue(ref(db,"snapshots"),snap=>{ const v=snap.val(); if(v) setSnapshots(Object.entries(v).map(([id,val])=>({...val,_id:id})).sort((a,b)=>b.date.localeCompare(a.date))); else setSnapshots([]); });
      },[]);

      // Auto-snapshot raz dziennie
      useEffect(()=>{
        const todayKey = new Date().toISOString().slice(0,10);
        const fbKey = todayKey.replace(/-/g,"_");
        const timer = setTimeout(()=>{
          onValue(ref(db,"snapshots/"+fbKey), snap=>{
            if(!snap.val()){
              const d = dataRef.current;
              const pilne = [];
              KONTENERY.forEach((n,i)=>{ const p=(d.kontenery||{})[i]?.pct||0; if(p>=80) pilne.push(n); });
              WORKI.forEach((n,i)=>{ const p=(d.worki||{})[i]?.pct||0; if(p>=80) pilne.push(n); });
              const allPcts = [...KONTENERY.map((_,i)=>(d.kontenery||{})[i]?.pct||0),...WORKI.map((_,i)=>(d.worki||{})[i]?.pct||0)];
              const avgPct = Math.round(allPcts.reduce((a,b)=>a+b,0)/allPcts.length);
              const snapshot = {
                date: todayKey,
                time: new Date().toLocaleTimeString("pl-PL",{hour:"2-digit",minute:"2-digit"}),
                kontenery: KONTENERY.map((n,i)=>({name:n,...((d.kontenery||{})[i]||{})})),
                worki: WORKI.map((n,i)=>({name:n,...((d.worki||{})[i]||{})})),
                strefy: STREFY.map((n,i)=>({name:n,...((d.strefy||{})[i]||{})})),
                butle: d.butle||{},
                wozki: (d.wozki||{}).list||[],
                szafka: d.szafka||{},
                pilneCount: pilne.length,
                pilneNames: pilne.slice(0,5),
                avgPct
              };
              set(ref(db,"snapshots/"+fbKey), snapshot);
            }
          },{onlyOnce:true});
        }, 3500);
        return ()=>clearTimeout(timer);
      },[]);

      const fbSet = (p,v) => set(ref(db,p),v);
      const upK = (i,v) => { const u={...kontenery,[i]:v}; setKontenery(u); fbSet("kontenery",u); };
      const upW = (i,v) => { const u={...worki,[i]:v}; setWorki(u); fbSet("worki",u); };
      const upS = (i,v) => { const u={...strefy,[i]:v}; setStrefy(u); fbSet("strefy",u); };
      const upWo = (k,v) => { const u={...wozki,[k]:v}; setWozki(u); fbSet("wozki",u); };
      const upB = (v) => { setButle(v); fbSet("butle",v); };
      const upP = (k,v) => { const u={...pracownicy,[k]:v}; setPracownicy(u); fbSet("pracownicy",u); };
      const upDone = (id) => { const u={...planerDone,[id]:!planerDone[id]}; setPlanerDone(u); fbSet("planerDone",u); };
      const upGrafik = (k,v) => { const u={...grafik,[k]:v}; setGrafik(u); fbSet("grafik",u); };
      const upSzafka = (v) => { setSzafka(v); fbSet("szafka",v); };
      const addN = (n) => { push(ref(db,"notatki"),n); setNotatki(p=>[...p,n]); };
      const addB = (e) => { push(ref(db,"baza"),e); };
      const delB = (id) => { set(ref(db,`baza/${id}`),null); };

      const TABS = [
        {id:"podsumowanie",label:"🏠 Podsumowanie"},
        {id:"kontenery",label:"📦 Kontenery"},
        {id:"worki",label:"🛍️ Worki"},
        {id:"strefy",label:"🗺️ Strefy"},
        {id:"szafka",label:"⚠️ Szafka"},
        {id:"wozki",label:"🚜 Wózki"},
        {id:"butle",label:"🔵 Butle"},
        {id:"pracownicy",label:"👷 Pracownicy"},
        {id:"grafik",label:"📅 Grafik"},
        {id:"planer",label:"📋 Planer"},
        {id:"notatki",label:"📝 Notatki"},
        {id:"historia",label:"📊 Historia"},
        {id:"baza",label:"📚 Baza wiedzy"},
        {id:"ai",label:"🤖 Agent AI"},
      ];

      return h('div',{style:css.app},
        h('div',{style:css.topbar},
          h('div',{style:css.logo},"PLAC ODPADÓW"),
          TABS.map(t=>h('button',{key:t.id,style:css.navBtn(tab===t.id),onClick:()=>setTab(t.id)},t.label))
        ),
        h('div',{style:css.main},
          tab==="podsumowanie"&&h(Podsumowanie,{kontenery,worki,strefy,wozki,butle,pracownicy,notatki,grafik}),
          tab==="kontenery"&&h(Kontenery,{data:kontenery,onUpdate:upK}),
          tab==="worki"&&h(Worki,{data:worki,onUpdate:upW}),
          tab==="strefy"&&h(Strefy,{data:strefy,onUpdate:upS}),
          tab==="szafka"&&h(SzafkaNiebezpiecznych,{data:szafka,onUpdate:upSzafka}),
          tab==="wozki"&&h(Wozki,{data:wozki,onUpdate:upWo}),
          tab==="butle"&&h(Butle,{data:butle,onUpdate:upB}),
          tab==="pracownicy"&&h(Pracownicy,{data:pracownicy,onUpdate:upP,grafik}),
          tab==="grafik"&&h(GrafikPracy,{pracownicy,grafik,onUpdate:upGrafik}),
          tab==="planer"&&h(Planer,{kontenery,worki,strefy,done:planerDone,onToggle:upDone}),
          tab==="notatki"&&h(Notatki,{data:notatki,onAdd:addN}),
          tab==="historia"&&h(HistoriaRaporty,{kontenery,worki,strefy,wozki,butle,pracownicy,notatki,szafka,snapshots}),
          tab==="baza"&&h(BazaWiedzy,{data:baza,onAdd:addB,onDelete:delB}),
          tab==="ai"&&h(AgentAI,{kontenery,worki,strefy,wozki,butle,pracownicy,notatki,baza,snapshots})
        )
      );
    }

    const PASSWORD = "plac2026";

    function Login({onLogin}) {
      const [pass, setPass] = useState("");
      const [error, setError] = useState(false);
      const tryLogin = () => {
        if(pass === PASSWORD) { onLogin(); }
        else { setError(true); setTimeout(()=>setError(false), 2000); }
      };
      return h('div',{style:{minHeight:"100vh",background:"#0f0f0f",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Inter',sans-serif"}},
        h('div',{style:{background:"#1a1a1a",border:"1px solid #2a2a2a",borderRadius:"12px",padding:"40px",width:"100%",maxWidth:"360px",textAlign:"center"}},
          h('div',{style:{color:"#22c55e",fontWeight:"900",fontSize:"22px",letterSpacing:"3px",marginBottom:"8px"}},"PLAC ODPADÓW"),
          h('div',{style:{color:"#555",fontSize:"14px",marginBottom:"32px"}},"System zarządzania placem"),
          h('input',{
            style:{background:"#111",border:`1px solid ${error?"#ef4444":"#333"}`,borderRadius:"6px",color:"#e8e8e8",padding:"12px 16px",fontFamily:"inherit",fontSize:"15px",width:"100%",boxSizing:"border-box",marginBottom:"12px",textAlign:"center",letterSpacing:"4px"},
            type:"password",placeholder:"Hasło",value:pass,
            onChange:e=>setPass(e.target.value),
            onKeyDown:e=>e.key==="Enter"&&tryLogin()
          }),
          error&&h('div',{style:{color:"#ef4444",fontSize:"13px",marginBottom:"12px"}},"Nieprawidłowe hasło"),
          h('button',{
            style:{background:"rgba(34,197,94,0.15)",border:"1px solid #22c55e",borderRadius:"6px",color:"#22c55e",padding:"12px 24px",cursor:"pointer",fontFamily:"inherit",fontSize:"15px",fontWeight:"600",width:"100%"},
            onClick:tryLogin
          },"Wejdź")
        )
      );
    }

    function Root() {
      const [loggedIn, setLoggedIn] = useState(()=>sessionStorage.getItem("plac_auth")==="1");
      const login = () => { sessionStorage.setItem("plac_auth","1"); setLoggedIn(true); };
      return loggedIn ? h(App,null) : h(Login,{onLogin:login});
    }

    createRoot(document.getElementById('root')).render(h(Root,null));
  </script>
</body>
</html>
